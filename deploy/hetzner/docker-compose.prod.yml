# Triangle Mesh — hosted DEMO stack (brain + operator console) for a Hetzner VPS.
# One domain, one passcode (HTTP basic auth via Caddy), automatic HTTPS.
#
#   cp .env.example .env   # fill in DOMAIN, TRIANGLE_TOKEN, BASIC_AUTH_*
#   docker compose -f docker-compose.prod.yml up -d --build
#   # optional populated picture (honest, labeled bench signal):
#   docker compose -f docker-compose.prod.yml --profile demo up -d
#
# This is the ONLY internet-facing operational deployment. It is a demo: keep it behind the
# passcode + noindex. The real field system still runs offline/local (see deploy/README.md).
name: triangle-demo

services:
  brain:
    build: ../../brain
    environment:
      - TRIANGLE_TOKEN=${TRIANGLE_TOKEN}
      - TRIANGLE_DB=/data/triangle.db
    volumes:
      - brain-data:/data
    expose:
      - "8000"
    restart: unless-stopped

  ui:
    build:
      context: ../../ui
      args:
        # The browser talks to the brain at https://DOMAIN/brain (same origin -> one passcode).
        - NEXT_PUBLIC_BRAIN_URL=https://${DOMAIN}/brain
        - NEXT_PUBLIC_BRAIN_TOKEN=${TRIANGLE_TOKEN}
    expose:
      - "3000"
    depends_on:
      - brain
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - BASIC_AUTH_USER=${BASIC_AUTH_USER}
      - BASIC_AUTH_HASH=${BASIC_AUTH_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - ui
      - brain
    restart: unless-stopped

  # OPTIONAL — honest bench demo so evaluators see a populated, MOVING picture.
  # Synthetic audio through the REAL detector -> brain; the console shows a "BENCH TEST SIGNAL"
  # banner so it is never read as a live field detection. Enable with `--profile demo`.
  demo:
    image: python:3.11-slim
    profiles: ["demo"]
    working_dir: /app
    volumes:
      - ../../:/app:ro
    environment:
      - TRIANGLE_TOKEN=${TRIANGLE_TOKEN}
    command:
      - sh
      - -c
      - |
        pip install --no-cache-dir numpy httpx >/dev/null &&
        python db/seed/seed_nodes.py --brain http://brain:8000 --token "$$TRIANGLE_TOKEN" --file db/seed/nodes.example.json || true &&
        python demo/bench_inject.py --brain http://brain:8000 --token "$$TRIANGLE_TOKEN" --interval 1.5
    depends_on:
      - brain
    restart: unless-stopped

volumes:
  brain-data:
  caddy-data:
  caddy-config:
