# Triangle node-agent config. Copy to config.yaml and edit for THIS node.
# Any sensor whose hardware is absent is skipped automatically (probe() decides).

node_id: node-alpha

# The node's fixed, surveyed position. GNSS can refine it, but a static install should know
# where it is. alt_m is optional.
position:
  lat: 52.3702
  lon: 4.8952
  alt_m: 3

# The fusion brain. Optional if the brain is discoverable on the LAN (mesh beacons); if set,
# used directly. Override with TRIANGLE_BRAIN_URL.
brain_url: http://192.168.1.10:8000

# Same bearer token as the brain and the rest of the mesh. Override with TRIANGLE_TOKEN.
token: triangle-dev-token

# Node relay server port (neighbors POST /relay here when their brain link is down).
relay_port: 51901

loop_interval_s: 0.5
buffer_path: /var/lib/triangle/node-alpha.outbox.db

# Enabled sensors. `type` maps to a driver in node-agent/sensors/. `config` is driver-specific.
sensors:
  - type: acoustic
    config:
      sample_rate: 48000
      frame_samples: 48000      # 1 s analysis window
      channels: 2               # >=2 with a known spacing -> bearing via TDOA
      mic_spacing_m: 0.15       # distance between the two mics
      array_heading_deg: 0      # true-north heading of the mic baseline
      device: null              # null = default input; or an index/name
      model_path: null          # optional trained ML model; null = DSP heuristic only

  - type: remote_id             # ESP32 OpenDroneID receiver over serial
    config:
      port: /dev/ttyUSB0
      baud: 115200

  - type: rf24                  # 2.4 GHz link energy — enabled only if the SDR reaches it
    config:
      sample_rate: 2000000
      n_samples: 262144

  - type: rf58                  # 5.8 GHz link energy — enabled only if the SDR reaches it
    config:
      sample_rate: 2000000

  - type: gnss                  # u-blox: position + PPS time discipline + jam/spoof health
    config:
      port: /dev/ttyACM0
      baud: 38400
      pps_gpio: null

  # Ground-target extension stubs (present the plugin path; probe() returns False until wired).
  - type: pir
    config: { gpio: 17 }
  - type: seismic
    config: { adc: ads1115 }
  - type: magnetometer
    config: { i2c_addr: 0x0d }
